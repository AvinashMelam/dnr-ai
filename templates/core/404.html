{% extends "base.html" %}

{% block title %}404 | Page Not Found | DNR AI{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: 60vh; padding: 40px 0;">
    <div class="card text-center animate-slide-up" style="max-width: 500px; padding: 48px 32px; border-color: rgba(99, 102, 241, 0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
        <div style="font-family: 'Outfit', sans-serif; font-size: 6rem; font-weight: 900; line-height: 1; margin-bottom: 16px;" class="text-primary-gradient">
            404
        </div>
        <h1 style="font-size: 1.75rem; margin-bottom: 12px; font-weight: 700;">Page Not Found</h1>
        <p class="text-secondary" style="margin-bottom: 32px; line-height: 1.6; font-size: 0.95rem;">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <a href="/home/" class="btn btn-primary">Return to Homepage</a>
            <button onclick="history.back()" class="btn btn-outline">Go Back</button>
        </div>
    </div>
</div>
{% endblock %}
